<div class="container">
    <div class="page-header">
        <h1>Csapatok</h1>
        <button mat-stroked-button routerLink="/ub">
            <mat-icon>arrow_back</mat-icon> Vissza
        </button>
    </div>
    <div class="header-actions">
        @if (isAdmin()) {
        <div class="add-team-form">
            <mat-form-field>
                <mat-label>Név</mat-label>
                <input matInput [(ngModel)]="newTeam.name">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Év</mat-label>
                <input matInput type="number" [(ngModel)]="newTeam.year">
            </mat-form-field>
            <button mat-raised-button color="primary" (click)="addTeam()">
                <mat-icon>add</mat-icon> Hozzáadás
            </button>
        </div>
        }
    </div>

    <table mat-table [dataSource]="teams">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Név</th>
            <td mat-cell *matCellDef="let team">{{ team.name }}</td>
        </ng-container>

        <ng-container matColumnDef="year">
            <th mat-header-cell *matHeaderCellDef>Év</th>
            <td mat-cell *matCellDef="let team">{{ team.year }}</td>
        </ng-container>

        <ng-container matColumnDef="startTime">
            <th mat-header-cell *matHeaderCellDef>Indulási időpont</th>
            <td mat-cell *matCellDef="let team">{{ team.startTime | date:'yyyy.MM.dd HH:mm' }}</td>
        </ng-container>


        <ng-container matColumnDef="actions">

            <th mat-header-cell *matHeaderCellDef>Műveletek</th>
            <td mat-cell *matCellDef="let team">
                <div class="action-buttons">
                    <button mat-raised-button color="primary" [routerLink]="[team.id]">
                        <mat-icon>group</mat-icon> Futók
                    </button>
                    <button mat-raised-button color="primary" [routerLink]="[team.id, 'plan']">
                        <mat-icon>map</mat-icon> Tervezés
                    </button>
                    @if (isAdmin()) {
                    <button mat-raised-button color="primary" [routerLink]="[team.id, 'edit']">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-raised-button color="warn" (click)="deleteTeam(team.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                    }
                </div>
            </td>

        </ng-container>


        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
