<div class="container">
  <div class="page-header">
    <h1>Szakaszok</h1>
    <button mat-stroked-button routerLink="/ub">
      <mat-icon>arrow_back</mat-icon> Vissza
    </button>
  </div>

  <div class="header-actions">
    <input type="file" #fileInput accept=".csv" (change)="onFileSelected($event)" hidden>
    <button mat-raised-button color="primary" (click)="fileInput.click()">
      <mat-icon>upload</mat-icon> CSV Import
    </button>
    <button mat-stroked-button routerLink="/ub/waypoints">
      <mat-icon>place</mat-icon> Váltópontok
    </button>
  </div>

  <table mat-table [dataSource]="sections">
    <ng-container matColumnDef="order">
      <th mat-header-cell *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let section">{{ section.order }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Név</th>
      <td mat-cell *matCellDef="let section">
        {{ section.startWayPoint?.name ?? '?' }} - {{ section.endWayPoint?.name ?? '?' }}
      </td>
    </ng-container>
    <ng-container matColumnDef="fullDistance">
      <th mat-header-cell *matHeaderCellDef>Teljes távolság(km)</th>
      <td mat-cell *matCellDef="let section">
        {{computeFullDistance(section.order) | number:'1.1-1'}}
      </td>
    </ng-container>
    <ng-container matColumnDef="distance">
      <th mat-header-cell *matHeaderCellDef>Táv (km)</th>
      <td mat-cell *matCellDef="let section">
        {{ section.distance }}
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Műveletek</th>
      <td mat-cell *matCellDef="let section">
        <div class="action-buttons">
          @if (isAdmin()) {
          <button mat-raised-button color="primary" (click)="editSection(section)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-raised-button (click)="insertAfter(section.order)">
            <mat-icon>add</mat-icon>
          </button>
          <button mat-raised-button color="warn" (click)="deleteSection(section.id)">
            <mat-icon>delete</mat-icon>
          </button>
          }
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
