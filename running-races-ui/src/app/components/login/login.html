<div class="login-container">
    <div class="login-card">
      <h1>Admin Bejelentkezés</h1>
  
      @if (error) {
        <div class="error">{{ error }}</div>
      }
  
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email cím</label>
          <input type="text" id="email" formControlName="email" />
        </div>
  
        <div class="form-group">
            <label for="password">Jelszó</label>
            <div class="password-input-container">
              <input 
                [type]="showPassword ? 'text' : 'password'" 
                id="password" 
                formControlName="password" />
              <button 
                type="button" 
                class="toggle-password" 
                (click)="togglePasswordVisibility()"
              >
                {{ showPassword ? '👓' : '🕶️' }}
              </button>
            </div>
          </div>
  
        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || loading">
          {{ loading ? 'Bejelentkezés...' : 'Bejelentkezés' }}
        </button>
      </form>
  
      <p class="hint">Hint: test@runningraceandi.com / Test123!</p>
      <p class="hint">Hint: admin@runningraceandi.com / Admin123!</p>
    </div>
  </div>
